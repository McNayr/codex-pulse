name: Self Test

on:
  push:
  pull_request:

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run Codex Pulse self-test
        run: ./scripts/self_test.sh
